{% extends "base.html" %}
{% block content %}
<h4 class="text-success mb-3">My Listings</h4>

{% if products|length == 0 %}
    <div class="alert alert-info text-center">You haven't listed any products yet.</div>
{% endif %}

<div class="row row-cols-1 row-cols-md-2 g-4">
    {% for product in products %}
    <div class="col">
        <div class="card shadow-sm h-100">
            <img src="{{ url_for('static', filename='uploads/' + product.image) }}" class="card-img-top" alt="Product">
            <div class="card-body">
                <h5 class="card-title">{{ product.title }}</h5>
                <p class="card-text text-muted">₹{{ product.price }}</p>
                <div class="d-flex justify-content-between">
                    <a href="{{ url_for('edit', id=product.id) }}" class="btn btn-outline-primary btn-sm">Edit</a>
                    <a href="{{ url_for('delete', id=product.id) }}" class="btn btn-outline-danger btn-sm">Delete</a>
                </div>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
