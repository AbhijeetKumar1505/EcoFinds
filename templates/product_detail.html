{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <img src="{{ url_for('static', filename='uploads/' + product.image) }}" class="card-img-top" alt="Product Image">
            <div class="card-body">
                <h4 class="card-title">{{ product.title }}</h4>
                <p class="text-muted">Category: {{ product.category }}</p>
                <p>{{ product.description }}</p>
                <h5 class="text-success">₹{{ product.price }}</h5>
                {% if current_user.is_authenticated %}
                <a href="{{ url_for('add_to_cart', product_id=product.id) }}" class="btn btn-success mt-2">Add to Cart</a>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
